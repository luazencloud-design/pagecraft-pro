<script>
const imgs = [];
let selF = [];
let resultData = null;
let generatedImgDataUrl = null;

// ── 테마 전환 ─────────────────────────────────
const root = document.documentElement;
const savedTheme = localStorage.getItem('pagecraft-theme') || 'dark';
if (savedTheme === 'light') applyLight();

function toggleTheme() {
  if (root.classList.contains('light')) {
    root.classList.remove('light');
    document.getElementById('themeLabel').textContent = '🌙 다크';
    localStorage.setItem('pagecraft-theme', 'dark');
  } else {
    applyLight();
    localStorage.setItem('pagecraft-theme', 'light');
  }
}

function applyLight() {
  root.classList.add('light');
  const label = document.getElementById('themeLabel');
  if (label) label.textContent = '☀️ 라이트';
}

// ── 업로드 ────────────────────────────────────
document.getElementById('fi').onchange = e => handleFiles(e.target.files);
const dz = document.getElementById('dz');
dz.onclick = () => document.getElementById('fi').click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag'); };
dz.ondragleave = () => dz.classList.remove('drag');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag'); handleFiles(e.dataTransfer.files); };

function handleFiles(files) {
  [...files].slice(0, 5 - imgs.length).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    const r = new FileReader();
    r.onload = e => { imgs.push({ name: f.name, data: e.target.result }); renderThumbs(); };
    r.readAsDataURL(f);
  });
}
function renderThumbs() {
  document.getElementById('thumbGrid').innerHTML = imgs.map((im,i) =>
    `<div class="thumb"><img src="${im.data}"><button class="thumb-del" onclick="rmImg(${i})">✕</button></div>`
  ).join('');
  document.getElementById('statusImgs').textContent = `사진 ${imgs.length}장`;
}
function rmImg(i) { imgs.splice(i,1); renderThumbs(); }

// ── 칩 ───────────────────────────────────────
document.querySelectorAll('#chips .chip').forEach(c => {
  c.onclick = () => {
    c.classList.toggle('on');
    const v = c.dataset.v;
    selF = c.classList.contains('on') ? [...selF,v] : selF.filter(x=>x!==v);
  };
});

// ── 플랫폼 상태 ───────────────────────────────
document.getElementById('pf').onchange = function() {
  document.getElementById('statusPf').textContent = '플랫폼: ' + this.value;
};

// ── 탭 ───────────────────────────────────────
const panelMap = {
  copy:   'panelCopy',
  title:  'panelTitle',
  tags:   'panelTags',
  export: 'panelExport',
};
document.querySelectorAll('.ptab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.ptab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    Object.values(panelMap).forEach(id => {
      const el = document.getElementById(id);
      if(el) el.style.display = 'none';
    });
    const target = panelMap[t.dataset.tab];
    if(target) document.getElementById(target).style.display = 'block';
  };
});

// ── 로딩 메시지 ───────────────────────────────
const loadSteps = [
  ['이미지 분석 중...','AI가 상품을 파악하고 있습니다'],
  ['카피라이팅 작성 중...','구매욕구를 자극하는 문구 생성 중'],
  ['스펙 표 구성 중...','상품 정보를 정리하는 중'],
  ['상세페이지 렌더링...','이미지로 변환하는 중'],
  ['마무리 중...','거의 다 됐어요!'],
];

// ── 생성 (오타 수정됨: ddocument -> document) ──
document.getElementById('genBtn').onclick = async function() {
  const brand = document.getElementById('brand').value.trim();
  const pname = document.getElementById('pname').value.trim();
  const price = document.getElementById('price').value.trim();
  const cat   = document.getElementById('cat').value;
  const pf    = document.getElementById('pf').value;
  const memo  = document.getElementById('memo').value.trim();
  const feats = selF.length ? selF.join(', ') : '없음';

  const btn = this;
  btn.disabled = true;
  btn.classList.add('loading');

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('resultPreview').classList.remove('show');
  document.getElementById('errBox').classList.remove('show');
  document.getElementById('loadingState').classList.add('show');

  let si = 0;
  const timer = setInterval(() => {
    const s = loadSteps[si++ % loadSteps.length];
    document.getElementById('loadMsg').textContent = s[0];
    document.getElementById('loadSub').textContent = s[1];
  }, 1600);

  const imgBlocks = imgs.slice(0,3).map(im => ({
    inlineData: {
      mimeType: im.data.split(';')[0].split(':')[1],
      data: im.data.split(',')[1]
    }
  }));

  const sys = `당신은 한국 쇼핑몰 상품 상세페이지 전문 카피라이터입니다. 
[절대 규칙]
1. 반드시 순수한 JSON 객체 하나만 출력하세요. 마크다운(\`\`\`json)은 금지입니다.
2. 값 내부의 줄바꿈은 반드시 문자열 '\\n'으로 표현하세요.
3. 모든 키와 문자열 값은 큰따옴표(")로 감싸세요.`;
  
  const usr = `상품 정보를 바탕으로 JSON 생성: 브랜드:${brand||'판단불가'}, 상품명:${pname||'판단불가'}, 가격:${price}, 카테고리:${cat}, 특징:${feats}, 플랫폼:${pf}, 메모:${memo}

{"product_name":"상품명","subtitle":"서브타이틀","main_copy":"메인카피","selling_points":["포인트1","포인트2","포인트3"],"description":"상세설명","specs":[{"key":"브랜드","value":"..."},{"key":"소재","value":"..."}],"keywords":["키워드1"],"caution":"주의사항"}`;

  try {
    const resp = await fetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'gemini-2.5-flash',
        generationConfig: {
          maxOutputTokens: 2000,
          responseMimeType: "application/json"
        },
        systemInstruction: { parts: [{ text: sys }] },
        contents: [
          { role: 'user', parts: [...imgBlocks, { text: usr }] }
        ]
      })
    });

    clearInterval(timer);

    if (!resp.ok) {
      const e = await resp.json();
      throw new Error(e.error?.message || e.message || `서버 에러 (${resp.status})`);
    }

    const data = await resp.json();
    let raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    
    let parsed;
    try {
      parsed = JSON.parse(raw.trim());
    } catch (e) {
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        parsed = JSON.parse(match[0].replace(/[\u0000-\u001F]/g, ""));
      } else {
        throw new Error('파싱실패');
      }
    }

    resultData = parsed;

    const renderResp = await fetch('/api/render', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        data: parsed,
        price: price,
        images: imgs.slice(0,3).map(im=>im.data)
      })
    });

    document.getElementById('loadingState').classList.remove('show');

    if (renderResp.ok) {
      const blob = await renderResp.blob();
      generatedImgDataUrl = URL.createObjectURL(blob);
      document.getElementById('previewImg').src = generatedImgDataUrl;
      document.getElementById('resultPreview').classList.add('show');
    } else {
      showTextResult(parsed, price);
    }

    renderPanel(parsed);
    document.getElementById('copyAllBtn').style.display = 'flex';
    document.getElementById('dlBtn').style.display = 'flex';
    toast('✅ 생성 완료!');

  } catch(e) {
    clearInterval(timer);
    document.getElementById('loadingState').classList.remove('show');
    const eb = document.getElementById('errBox');
    eb.innerHTML = `❌ <strong>오류</strong>: ${e.message}`;
    eb.classList.add('show');
  }

  btn.disabled = false;
  btn.classList.remove('loading');
};

function showTextResult(d, priceInput) {
  const priceNum = priceInput ? parseInt(priceInput.replace(/[^0-9]/g,''),10) : null;
  const priceHtml = priceNum ? `<div style="font-size:20px;font-weight:700;color:#e8c97a;margin-top:8px">${priceNum.toLocaleString()}원</div>` : '';
  const specs = (d.specs||[]).map(s=>`<tr><td style="padding:8px;color:#888;font-size:12px;font-weight:600;border-bottom:1px solid #222">${s.key}</td><td style="padding:8px;color:#ccc;font-size:12px;border-bottom:1px solid #222">${s.value}</td></tr>`).join('');
  const kws = (d.keywords||[]).map(k=>`<span style="display:inline-block;padding:4px 10px;border:1px solid #333;border-radius:20px;font-size:11px;color:#888;margin:3px">#${k}</span>`).join('');

  document.getElementById('resultPreview').innerHTML = `
  <div style="background:#13131a;padding:24px;font-family:'Noto Sans KR',sans-serif;color:#f0ede8">
    <div style="font-size:10px;letter-spacing:2px;color:#e8c97a;margin-bottom:8px">상품명</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">${d.product_name||''}</div>
    <div style="font-size:13px;color:#9998a8;margin-bottom:4px">${d.subtitle||''}</div>
    ${priceHtml}
    <div style="height:1px;background:#222;margin:16px 0"></div>
    <div style="font-size:10px;letter-spacing:2px;color:#e8c97a;margin-bottom:8px">메인 카피</div>
    <div style="font-size:15px;font-weight:600;line-height:1.6">${(d.main_copy||'').replace(/\n/g,'<br>')}</div>
    <div style="height:1px;background:#222;margin:16px 0"></div>
    <div style="font-size:10px;letter-spacing:2px;color:#e8c97a;margin-bottom:10px">판매 포인트</div>
    ${(d.selling_points||[]).map(p=>`<div style="display:flex;gap:8px;margin-bottom:8px;font-size:13px;color:#ccc"><span style="color:#3ecf8e">✓</span>${p}</div>`).join('')}
    <div style="height:1px;background:#222;margin:16px 0"></div>
    <div style="font-size:10px;letter-spacing:2px;color:#e8c97a;margin-bottom:8px">스펙 표</div>
    <table style="width:100%;border-collapse:collapse">${specs}</table>
    <div style="height:1px;background:#222;margin:16px 0"></div>
    <div style="font-size:10px;letter-spacing:2px;color:#e8c97a;margin-bottom:8px">검색 키워드</div>
    <div>${kws}</div>
  </div>`;
  document.getElementById('resultPreview').classList.add('show');
}

function renderPanel(d) {
  const blocks = [
    {title:'상품명', body:`${d.product_name}\n${d.subtitle}`},
    {title:'메인 카피', body:d.main_copy},
    {title:'판매 포인트', body:(d.selling_points||[]).map((p,i)=>`${i+1}. ${p}`).join('\n')},
    {title:'상세 설명', body:d.description},
    {title:'스펙 표', body:(d.specs||[]).map(s=>`${s.key}: ${s.value}`).join('\n')},
    {title:'검색 키워드', body:(d.keywords||[]).join(', ')},
    {title:'주의사항', body:d.caution},
  ];
  document.getElementById('panelCopy').innerHTML = blocks.map(b=>`
    <div class="copy-block">
      <div class="copy-block-hdr">
        <span class="copy-block-title">${b.title}</span>
        <button class="copy-btn" onclick="cp(this,'${esc(b.body)}')">📋 복사</button>
      </div>
      <div class="copy-block-body">${(b.body||'').replace(/\n/g,'<br>')}</div>
    </div>`).join('');
}

function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }
function cp(btn, text) {
  navigator.clipboard.writeText(text.replace(/\\n/g,'\n'));
  btn.textContent='✓ 복사됨'; btn.classList.add('ok');
  setTimeout(()=>{ btn.textContent='📋 복사'; btn.classList.remove('ok'); },1500);
}
function copyAll() {
  if (!resultData) return;
  const d = resultData;
  const t = `[상품명]\n${d.product_name}\n\n[서브타이틀]\n${d.subtitle}\n\n[메인카피]\n${d.main_copy}\n\n[판매포인트]\n${(d.selling_points||[]).join('\n')}\n\n[상세설명]\n${d.description}\n\n[스펙]\n${(d.specs||[]).map(s=>s.key+': '+s.value).join('\n')}\n\n[키워드]\n${(d.keywords||[]).join(', ')}\n\n[주의사항]\n${d.caution}`;
  navigator.clipboard.writeText(t);
  toast('📋 전체 내용이 복사되었습니다!');
}
function downloadImg() {
  if (generatedImgDataUrl) {
    const a = document.createElement('a');
    a.href = generatedImgDataUrl;
    a.download = `${(resultData?.product_name||'상세페이지').replace(/\s/g,'_')}.png`;
    a.click();
    toast('⬇ 이미지가 저장되었습니다!');
  } else {
    toast('⚠ 먼저 상세페이지를 생성해주세요');
  }
}

// ── 상품명 최적화 생성 (Gemini 적용 및 파싱 강화) ──
async function runTitleGen() {
  const brand = document.getElementById('brand').value.trim();
  const pname = document.getElementById('pname').value.trim();
  const cat   = document.getElementById('cat').value;
  const pf    = document.getElementById('pf').value;
  const feats = selF.length ? selF.join(', ') : '';
  const memo  = document.getElementById('memo').value.trim();

  if (!resultData && !brand && !pname) {
    document.getElementById('titleResult').innerHTML =
      '<div class="tool-empty">먼저 상세페이지를 생성하거나<br>브랜드명/상품명을 입력해주세요.</div>';
    return;
  }

  const btn = document.getElementById('titleBtn');
  btn.disabled = true; btn.classList.add('loading');
  document.getElementById('titleResult').innerHTML =
    '<div class="tool-empty">AI가 최적화 상품명을 생성 중입니다...</div>';

  const productInfo = resultData
    ? `상품명: ${resultData.product_name}, 카테고리: ${cat}, 특징: ${(resultData.selling_points||[]).join(', ')}`
    : `브랜드: ${brand}, 상품명: ${pname}, 카테고리: ${cat}, 특징: ${feats}, 메모: ${memo}`;

  const sys = `당신은 쿠팡/스마트스토어 상품명 최적화 전문가입니다. 반드시 순수 JSON만 출력하세요.`;
  const usr = `아래 상품 정보를 바탕으로 SEO 최적화된 상품명 5가지를 생성해주세요.

상품 정보: ${productInfo}
플랫폼: ${pf}

규칙:
- 각 상품명은 40자 이내
- 검색량이 많은 키워드를 앞에 배치
- 브랜드명, 소재, 특징, 사이즈/색상 정보 포함
- 각각 다른 전략으로 작성 (키워드 중심, 특징 중심, 타깃 중심 등)

{"titles": [
  {"rank": 1, "strategy": "키워드 중심", "title": "..."},
  {"rank": 2, "strategy": "특징 강조", "title": "..."},
  {"rank": 3, "strategy": "타깃 명확화", "title": "..."},
  {"rank": 4, "strategy": "브랜드 강조", "title": "..."},
  {"rank": 5, "strategy": "혜택 중심", "title": "..."}
]}`;

  try {
    const resp = await fetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'gemini-2.5-flash',
        generationConfig: { maxOutputTokens: 800, responseMimeType: "application/json" },
        systemInstruction: { parts: [{ text: sys }] },
        contents: [{ role: 'user', parts: [{ text: usr }] }]
      })
    });
    if (!resp.ok) throw new Error(`서버 오류 (${resp.status})`);
    const data = await resp.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    
    let parsed;
    try {
      parsed = JSON.parse(raw.trim());
    } catch (e) {
      const match = raw.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(match[0].replace(/[\u0000-\u001F]/g, ""));
    }
    const titles = parsed.titles || [];

    document.getElementById('titleResult').innerHTML = titles.map(t => `
      <div class="title-card">
        <div class="title-rank">${t.rank}. ${t.strategy}</div>
        <div class="title-text">${t.title}</div>
        <button class="title-copy" onclick="cp(this,'${t.title.replace(/'/g,"\'")}')">복사</button>
      </div>`).join('');

    toast('✨ 최적화 상품명 5개 생성 완료!');
  } catch(e) {
    document.getElementById('titleResult').innerHTML =
      `<div class="tool-empty" style="color:var(--red)">오류: ${e.message}</div>`;
  }
  btn.disabled = false; btn.classList.remove('loading');
}

// ── 쿠팡 태그 20개 생성 (Gemini 적용 및 파싱 강화) ──
async function runTagGen() {
  const brand = document.getElementById('brand').value.trim();
  const cat   = document.getElementById('cat').value;
  const feats = selF.length ? selF.join(', ') : '';
  const memo  = document.getElementById('memo').value.trim();

  if (!resultData && !brand) {
    document.getElementById('tagsResult').innerHTML =
      '<div class="tool-empty">먼저 상세페이지를 생성하거나<br>브랜드명을 입력해주세요.</div>';
    return;
  }

  const btn = document.getElementById('tagsBtn');
  btn.disabled = true; btn.classList.add('loading');
  document.getElementById('tagsResult').innerHTML =
    '<div class="tool-empty">AI가 태그를 생성 중입니다...</div>';

  const productInfo = resultData
    ? `상품명: ${resultData.product_name}, 카테고리: ${cat}, 키워드: ${(resultData.keywords||[]).join(', ')}, 특징: ${(resultData.selling_points||[]).join(', ')}`
    : `브랜드: ${brand}, 카테고리: ${cat}, 특징: ${feats}, 메모: ${memo}`;

  const sys = `당신은 쿠팡 검색 최적화 전문가입니다. 반드시 순수 JSON만 출력하세요.`;
  const usr = `아래 상품에 맞는 쿠팡 검색 태그 20개를 생성해주세요.

상품 정보: ${productInfo}

규칙:
- 실제 쿠팡 검색량이 높은 키워드 중심
- 브랜드명, 카테고리, 소재, 특징, 용도, 색상, 타깃 고객 등 다양하게
- 각 태그는 2~10자 이내
- 중복 없이 20개

{"tags": ["태그1","태그2","태그3","태그4","태그5","태그6","태그7","태그8","태그9","태그10","태그11","태그12","태그13","태그14","태그15","태그16","태그17","태그18","태그19","태그20"]}`;

  try {
    const resp = await fetch('/api/generate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'gemini-2.5-flash',
        generationConfig: { maxOutputTokens: 500, responseMimeType: "application/json" },
        systemInstruction: { parts: [{ text: sys }] },
        contents: [{ role: 'user', parts: [{ text: usr }] }]
      })
    });
    if (!resp.ok) throw new Error(`서버 오류 (${resp.status})`);
    const data = await resp.json();
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    
    let parsed;
    try {
      parsed = JSON.parse(raw.trim());
    } catch (e) {
      const match = raw.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(match[0].replace(/[\u0000-\u001F]/g, ""));
    }
    const tags = parsed.tags || [];

    const tagCloud = tags.map(tag =>
      `<button class="tag-item" onclick="cpTag(this,'${tag.replace(/'/g,"\'")}')">
        ${tag}
      </button>`
    ).join('');

    document.getElementById('tagsResult').innerHTML = `
      <div style="font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:1px">
        태그 클릭 시 개별 복사 · 아래 버튼으로 전체 복사
      </div>
      <div class="tag-cloud">${tagCloud}</div>
      <button class="tag-copy-all" id="tagCopyAllBtn" onclick="cpAllTags(${JSON.stringify(tags).replace(/"/g,'&quot;')})">
        📋 태그 20개 전체 복사
      </button>`;

    toast('🏷 태그 20개 생성 완료!');
  } catch(e) {
    document.getElementById('tagsResult').innerHTML =
      `<div class="tool-empty" style="color:var(--red)">오류: ${e.message}</div>`;
  }
  btn.disabled = false; btn.classList.remove('loading');
}

function cpTag(btn, tag) {
  navigator.clipboard.writeText(tag);
  const orig = btn.textContent.trim();
  btn.textContent = '✓';
  btn.style.borderColor = 'var(--green)';
  btn.style.color = 'var(--green)';
  setTimeout(() => {
    btn.textContent = orig;
    btn.style.borderColor = '';
    btn.style.color = '';
  }, 1200);
}

function cpAllTags(tags) {
  navigator.clipboard.writeText(tags.join(', '));
  const btn = document.getElementById('tagCopyAllBtn');
  btn.textContent = '✓ 복사됨!';
  btn.classList.add('ok');
  setTimeout(() => {
    btn.textContent = '📋 태그 20개 전체 복사';
    btn.classList.remove('ok');
  }, 1500);
  toast('🏷 태그 20개가 복사되었습니다!');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
